<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPA LP LINK GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f3f4f6; }
        .brutal-box { border: 3px solid #000; box-shadow: 5px 5px 0px 0px #000; }
        .brutal-btn { border: 3px solid #000; box-shadow: 3px 3px 0px 0px #000; transition: 0.1s; }
        .brutal-btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px 0px #000; }
    </style>
</head>
<body class="p-4 sm:p-10 flex flex-col items-center">

    <div class="max-w-2xl w-full bg-white brutal-box p-6 sm:p-8">
        <h1 class="text-2xl font-black uppercase mb-2">🌪️ NPA LP GENERATOR</h1>
        <p class="text-xs font-bold text-gray-600 mb-6 uppercase tracking-widest">Buat 8 Link Funnel Mitra Dalam 5 Detik</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase mb-1">Nama Panggilan Mitra</label>
                <input type="text" id="nama-mitra" class="w-full border-3 border-black p-3 font-bold outline-none focus:bg-yellow-50" placeholder="Contoh: Sri Wahyuni">
            </div>

            <div>
                <!-- REVISI TULISAN DI SINI -->
                <label class="block text-xs font-bold uppercase mb-1">Nomor WA (Awali dengan Kode Negara, Tanpa '+')</label>
                <input type="number" id="nomor-wa" class="w-full border-3 border-black p-3 font-bold outline-none focus:bg-cyan-50" placeholder="Contoh: 886917282849 atau 628123456">
            </div>

            <button onclick="buatLink()" class="w-full bg-[#facc15] brutal-btn py-4 font-black uppercase tracking-widest mt-4">🚀 GENERATE SEMUA LINK</button>
        </div>

        <div id="hasil-section" class="hidden mt-10 space-y-6 border-t-4 border-black pt-8">
            <h2 class="font-black text-center bg-black text-white py-2 uppercase italic">Siap Kirim ke Mitra! 🔥</h2>
            
            <div id="list-link" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Hasil generate akan muncul di sini -->
            </div>
        </div>
    </div>

    <script>
        function buatLink() {
            const namaInput = document.getElementById('nama-mitra').value.trim();
            const wa = document.getElementById('nomor-wa').value.trim();
            
            if(!namaInput || !wa) {
                alert("Isi Nama & Nomor WA dulu ya Pakde!");
                return;
            }

            const namaAman = encodeURIComponent(namaInput);
            const baseUrl = "https://3ireborn.github.io/npa-funnel-magnet/";
            
            const daftarLP = [
                { judul: "👩‍👧 1. BIAYA SEKOLAH", file: "biaya-sekolah.html" },
                { judul: "🏠 2. EMAK-EMAK (IRT)", file: "emak.html" },
                { judul: "✈️ 3. TKW / PMI", file: "tkw.html" },
                { judul: "💼 4. KARYAWAN", file: "karyawan.html" },
                { judul: "🎓 5. MAHASISWA", file: "mahasiswa.html" },
                { judul: "🏪 6. PEDAGANG", file: "pedagang.html" },
                { judul: "👔 7. PENGUSAHA", file: "pengusaha.html" },
                { judul: "🏛️ 8. PNS", file: "pns.html" }
            ];

            let htmlLink = "";

            daftarLP.forEach(lp => {
                const linkFinal = `${baseUrl}${lp.file}?wa=${wa}&name=${namaAman}`;
                htmlLink += `
                    <div class="p-3 bg-gray-50 border-2 border-black relative flex flex-col justify-between">
                        <div>
                            <p class="text-[10px] font-black uppercase mb-1 text-red-600">${lp.judul}</p>
                            <p id="${lp.file}" class="text-[10px] font-bold break-all bg-white p-2 border border-black mb-2">${linkFinal}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="copyLink('${lp.file}')" class="text-[10px] bg-black text-white py-2 font-bold uppercase hover:bg-gray-800 border-2 border-black">📋 Copy</button>
                            <a href="${linkFinal}" target="_blank" class="text-[10px] bg-blue-600 text-white py-2 font-bold uppercase hover:bg-blue-700 text-center block border-2 border-black shadow-[2px_2px_0px_0px_#000]">🌐 Preview</a>
                        </div>
                    </div>
                `;
            });

            document.getElementById('list-link').innerHTML = htmlLink;
            document.getElementById('hasil-section').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function copyLink(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Link berhasil disalin, Pakde! 🔥");
            });
        }
    </script>
</body>
</html>
