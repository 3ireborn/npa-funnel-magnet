<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Affiliate NPA Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border-2 border-yellow-400 w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-yellow-400 mb-2">MESIN AFFILIATE NPA</h1>
        <p class="text-sm text-slate-300 mb-6">Cetak Link Promosi Anda Sendiri & Dapatkan Komisi Rp 50.000 per Penjualan!</p>

        <div class="space-y-4 text-left">
            <!-- Input Nama / Kupon -->
            <div>
                <label class="block text-sm font-semibold text-yellow-300 mb-1">1. Nama Anda (Untuk Kode Kupon)</label>
                <input type="text" id="inputNama" placeholder="Contoh: YANDI" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white focus:outline-none focus:border-yellow-400 uppercase" oninput="this.value = this.value.toUpperCase()">
                <p class="text-[10px] text-slate-400 mt-1">*Gunakan 1 kata saja tanpa spasi (Cth: BUDI, TINI)</p>
            </div>

            <!-- Input Nomor WA -->
            <div>
                <label class="block text-sm font-semibold text-yellow-300 mb-1">2. Nomor WhatsApp Anda</label>
                <input type="number" id="inputWa" placeholder="Contoh: 628123456789" class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-600 text-white focus:outline-none focus:border-yellow-400">
                <p class="text-[10px] text-slate-400 mt-1">*Wajib gunakan 62 di awal, tanpa angka 0, tanda + atau spasi.</p>
            </div>

            <!-- Tombol Generate -->
            <button onclick="generateLink()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-3 rounded-lg shadow-lg transform transition hover:scale-105 mt-2">
                ⚙️ BUAT LINK SAYA SEKARANG
            </button>
        </div>

        <!-- Area Hasil Output Link -->
        <div id="resultArea" class="hidden mt-6 pt-6 border-t border-slate-600">
            <p class="text-sm font-bold text-green-400 mb-2">✅ Link Berhasil Dibuat!</p>
            <textarea id="outputLink" readonly class="w-full h-24 p-3 bg-slate-900 border border-green-500 text-green-300 text-sm rounded-lg mb-3"></textarea>
            
            <button onclick="copyLink()" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold py-2 rounded-lg shadow-md transition">
                📋 COPY LINK PROMOSI
            </button>
        </div>
        
        <p class="text-xs text-slate-500 mt-6">Sistem Bagi Hasil Langsung - Bukan MLM.<br>&copy; NPA Smart System</p>
    </div>

    <!-- Script Logika Mesin Generator -->
    <script>
        function generateLink() {
            const nama = document.getElementById('inputNama').value.trim();
            const wa = document.getElementById('inputWa').value.trim();
            const resultArea = document.getElementById('resultArea');
            const outputLink = document.getElementById('outputLink');

            if(!nama || !wa) {
                alert("Mohon isi Nama dan Nomor WhatsApp terlebih dahulu, Komandan!");
                return;
            }

            // Pastikan URL dasar ini sesuai dengan alamat web GitHub Ndan
            const baseUrl = "https://3ireborn.github.io/npa-funnel-magnet/promo.html";
            
            // Merakit URL baru
            const linkJadi = `${baseUrl}?kupon=${nama}50&wa_mitra=${wa}`;
            
            outputLink.value = linkJadi;
            resultArea.classList.remove('hidden');
        }

        function copyLink() {
            const copyText = document.getElementById('outputLink');
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Untuk HP
            navigator.clipboard.writeText(copyText.value);
            alert("Link berhasil di-copy! Silakan paste di Facebook atau WA Anda.");
        }
    </script>
</body>
</html>
